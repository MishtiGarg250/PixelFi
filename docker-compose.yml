
volumes:
  ml-models: # Storage for trained ML models

networks:
  pixelfi-net:
    driver: bridge # Connects containers in an isolated network, allowing them to communicate by service name (e.g., "server" can call "ml-service" directly).

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: pixelfi-server

    env_file:
      - ./server/.env

    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

    ports:
      - "5005:5005" # Server port

    networks:
      - pixelfi-net

    depends_on:
      ml-service:
        condition: service_started
      kafka:
        condition: service_started

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:5005/health"]
      interval: 30s
      timeout: 10s     
      retries: 3      
      start_period: 15s 

    restart: unless-stopped

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: pixelfi-ml

    env_file:
      - ./ml-service/.env

    environment:
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

    ports:
      - "8000:8000"

    volumes:
      - ml-models:/app/artifacts

    networks:
      - pixelfi-net

    depends_on:
      kafka:
        condition: service_started

    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

    restart: unless-stopped

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: pixelfi-kafka
    ports:
      - "9092:9092"
    networks:
      - pixelfi-net
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_LOG_DIRS: '/tmp/kraft-combined-logs'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dmlhYmxlLXBlYWNvY2stMzIuY2xlcmsuYWNjb3VudHMuZGV2JA"
        NEXT_PUBLIC_API_URL: "http://localhost:5005/api"
        NEXT_PUBLIC_FINNHUB_API_KEY: "d7d7r7pr01qggoenabj0d7d7r7pr01qggoenabjg"
    container_name: pixelfi-client

    environment:
      CLERK_SECRET_KEY: "sk_test_AG3QxMn2oGT1ugaQLyZPCDmSdEfGpJHobFkqHIfElk"
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: "pk_test_dmlhYmxlLXBlYWNvY2stMzIuY2xlcmsuYWNjb3VudHMuZGV2JA"
      NEXT_PUBLIC_API_URL: "http://localhost:5005/api"
      FINNHUB_BASE_URL: "https://finnhub.io/api/v1"
      NEXT_PUBLIC_FINNHUB_API_KEY: "d7d7r7pr01qggoenabj0d7d7r7pr01qggoenabjg"
      PORT: "3000"
      HOSTNAME: "0.0.0.0"

    ports:
      - "3000:3000"

    networks:
      - pixelfi-net

    depends_on:
      - server

    restart: unless-stopped
